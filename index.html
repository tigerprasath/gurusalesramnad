                buyerAddress: ''

        // ========== CUSTOMER AUTOCOMPLETE ==========
        const getExistingCustomers = () => {
            const map = {};
            // include explicit customers saved from form
            (app.customers || []).forEach(c => {
                if (c.name && c.name.trim()) map[c.name] = { name: c.name, phone: c.phone || '', address: c.address || '' };
            });
            // include customers inferred from invoices
            app.invoices.forEach(inv => {
                if (inv.buyer_name && inv.buyer_name.trim() && !map[inv.buyer_name]) {
                    map[inv.buyer_name] = {
                        name: inv.buyer_name,
                        phone: inv.buyer_phone || '',
                        address: inv.buyer_address || ''
                    };
                }
            });

            return Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
        };

        const updateCustomerDropdown = (searchTerm) => {
            const dropdown = document.getElementById('customerDropdown');
            if (!dropdown) return;

            const customers = getExistingCustomers();
            const filtered = customers.filter(c =>
                c.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (searchTerm.length === 0 || filtered.length === 0) {
                dropdown.classList.remove('show');
                dropdown.innerHTML = '';
                return;
            }

            dropdown.classList.add('show');
            dropdown.innerHTML = filtered.map(customer => `
                <div class="autocomplete-item" onclick="selectCustomer('${customer.name.replace(/'/g, "\\'")}', '${customer.phone.replace(/'/g, "\\'")}', '${customer.address.replace(/'/g, "\\'").replace(/\n/g, " ")}')">
                    <div class="autocomplete-item-name">${customer.name}</div>
                    ${customer.phone ? `<div class="autocomplete-item-phone">📞 ${customer.phone}</div>` : ''}
                </div>
            `).join('');
        };

        const selectCustomer = (name, phone, address) => {
            app.currentInvoice.buyerName = name;
            app.currentInvoice.buyerPhone = phone;
            app.currentInvoice.buyerAddress = address;

            const nameInput = document.getElementById('buyerName');
            const phoneInput = document.getElementById('buyerPhone');
            const addressInput = document.getElementById('buyerAddress');

            if (nameInput) nameInput.value = name;
            if (phoneInput) phoneInput.value = phone;
            if (addressInput) addressInput.value = address;

            const dropdown = document.getElementById('customerDropdown');
            if (dropdown) dropdown.classList.remove('show');
        };

        // ========== UTILITY FUNCTIONS ==========
        const amountToWords = (amount) => {
            const ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine"];
            const teens = ["Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
            const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];

            const convertBelow1000 = (num) => {
                if (num === 0) return "";
                if (num < 10) return ones[num];
                if (num < 20) return teens[num - 10];
                if (num < 100) return tens[Math.floor(num / 10)] + (num % 10 === 0 ? "" : " " + ones[num % 10]);
                return ones[Math.floor(num / 100)] + " Hundred" + (num % 100 === 0 ? "" : " " + convertBelow1000(num % 100));
            };

            if (amount === 0) return "Zero";
            amount = Math.round(amount);

            const crores = Math.floor(amount / 10000000);
            amount %= 10000000;
            const lakhs = Math.floor(amount / 100000);
            amount %= 100000;
            const thousands = Math.floor(amount / 1000);
            amount %= 1000;

            let result = [];
            if (crores > 0) result.push(convertBelow1000(crores) + " Crore");
            if (lakhs > 0) result.push(convertBelow1000(lakhs) + " Lakh");
            if (thousands > 0) result.push(convertBelow1000(thousands) + " Thousand");
            if (amount > 0) result.push(convertBelow1000(amount));

            return result.join(" ") + " Rupees Only";
        };

        const formatCurrency = (amount) => {
            return "₹" + amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        };

        const generateInvoiceNo = () => {
            const now = new Date();
            let year = now.getFullYear();
            let month = now.getMonth();

            let fy_start, fy_end;
            if (month >= 3) { // April onwards
                fy_start = year;
                fy_end = year + 1;
            } else {
                fy_start = year - 1;
                fy_end = year;
            }

            const fy = `${String(fy_start).slice(-2)}-${String(fy_end).slice(-2)}`;
            const prefix = `GURU/${fy}/`;

            const lastInvoice = app.invoices.filter(i => i.invoice_no.startsWith(prefix)).sort((a, b) => {
                const aSeq = parseInt(a.invoice_no.split('/')[2] || 0);
                const bSeq = parseInt(b.invoice_no.split('/')[2] || 0);
                return bSeq - aSeq;
            })[0];

            const nextSeq = lastInvoice ?
                (parseInt(lastInvoice.invoice_no.split('/')[2]) + 1) : 1;

            return `${prefix}${nextSeq}`;
        };

                        app.products = data.products || defaultData.products;
                        app.invoices = data.invoices || [];
                        app.invoiceItems = data.invoiceItems || [];
                        saveData();
                        showAlert('Data imported successfully!', 'success');
                        render();
                    } catch (err) {
                        showAlert('Error importing file: ' + err.message, 'error');
                    }
                };
                reader.readAsText(e.target.files[0]);
            };
            document.body.appendChild(fileInput);

            // Try to load from storage first

                app.products = defaultData.products;

            if (!productName || !packSize) {

            const product = app.products.find(p => p.PRODUCT_NAME === productName && p.PACK_SIZE === packSize);

                showAlert('Product not found', 'error');
                return;
            }

            if (qty > product.AVAILABLE_STOCK) {
                showAlert(`Only ${product.AVAILABLE_STOCK} units available`, 'error');
                return;
            }

            app.currentInvoice.items.push({
                id: product.id,
                code: product.PRODUCT_CODE,
                name: product.PRODUCT_NAME,
                pack: product.PACK_SIZE,
                price: product.BILLING_PRICE,

                invoiceItems: app.invoiceItems,
                lastSync: new Date().toISOString()
            };

            const link = document.createElement('a');

            const w = window.open('', '_blank', 'width=900,height=700');
            if (!w) { showAlert('Unable to open print window (popup blocked?)', 'error'); return; }
            w.document.write('<html><head><title>' + (title || '') + '</title>');
            w.document.write('<meta charset="utf-8"/>');
            // Basic print styles
            w.document.write('<style>body{font-family: Arial, sans-serif; color:#000;}</style>');
            // Page sizing
            if (pageSize === 'A4-landscape' || pageSize === 'A4-land') {
                // A4 landscape: two A5 (portrait) invoices side-by-side
                w.document.write('<style>@page{size:A4 landscape; margin:6mm;} body{margin:0;} .sheet{display:grid; grid-template-columns: 1fr 1fr; gap:8mm; page-break-after: always; align-items:start;} .a5{box-sizing:border-box; width:100%;}</style>');
            } else if (pageSize === 'A4') {
                // A4 portrait (fallback)
                w.document.write('<style>@page{size:A4 portrait; margin:6mm;} body{margin:0;} .sheet{display:grid; grid-template-columns: 1fr 1fr; gap:8mm; page-break-after: always; align-items:start;} .a5{box-sizing:border-box; width:100%;}</style>');
            } else {
                w.document.write('<style>@page{size:A5 portrait; margin:4mm;} body{margin:0;} .a5{width:100%; box-sizing:border-box;}</style>');
            }
            w.document.write('</head><body>');
            w.document.write(content);
            w.document.write('</body></html>');
            w.document.close();
            w.focus();
            setTimeout(() => { try { w.print(); } catch (e) { console.error(e); } }, 600);
        };

        const downloadInvoicePDF = (invoiceId) => {
            const invoice = app.invoices.find(i => i.id === invoiceId);
            if (!invoice) { showAlert('Invoice not found', 'error'); return; }
            const items = app.invoiceItems.filter(i => i.invoice_id === invoiceId);
            const html = `<div class="a5">${generateInvoiceHTML(invoice, items)}</div>`;
            openPrintWindow(html, invoice.invoice_no, 'A5');
        };

        // Print one invoice as a pair on A4 landscape: Original + Customer Copy (two A5 blocks)
        const printInvoicePair = (invoiceId) => {
            const invoice = app.invoices.find(i => i.id === invoiceId);
            if (!invoice) { showAlert('Invoice not found', 'error'); return; }
            const items = app.invoiceItems.filter(i => i.invoice_id === invoiceId);
            const invHtml = generateInvoiceHTML(invoice, items);

            const html = `
                <div class="sheet">
                    <div class="a5">
                        <div style="text-align:right; font-weight:bold; margin-bottom:6px;">Original</div>
                        ${invHtml}
                    </div>
                    <div class="a5">
                        <div style="text-align:right; font-weight:bold; margin-bottom:6px;">Customer Copy</div>
                        ${invHtml}
                    </div>
                </div>
            `;

            openPrintWindow(html, invoice.invoice_no, 'A4-landscape');
        };

        const cancelInvoice = (invoiceId) => {
            if (!confirm('Cancel this invoice and restore stock? This cannot be easily undone.')) return;
            const invoice = app.invoices.find(i => i.id === invoiceId);
            if (!invoice) { showAlert('Invoice not found', 'error'); return; }
            if (invoice.cancelled) { showAlert('Invoice already cancelled', 'info'); return; }

            // Restore stock from invoice items
            const items = app.invoiceItems.filter(it => it.invoice_id === invoiceId);
            items.forEach(it => {
                // try to find exact product by code and pack
                let product = app.products.find(p => (p.PRODUCT_CODE === it.product_code || p.PRODUCT_CODE == it.product_code) && p.PACK_SIZE === it.pack_size);
                if (!product) {
                    // fallback: match by name and pack
                    product = app.products.find(p => p.PRODUCT_NAME === it.product_name && p.PACK_SIZE === it.pack_size);
                }
                if (product) {
                    product.AVAILABLE_STOCK = (product.AVAILABLE_STOCK || 0) + (it.quantity || 0);
                }
            });

            invoice.cancelled = true;
            invoice.cancelled_date = new Date().toISOString();
            saveData();
            showAlert(`Invoice ${invoice.invoice_no} cancelled and stock restored`, 'success');
            render();
        };

        // Download invoices for a date range (from,to in YYYY-MM-DD). Arrange 2 A5 invoices per A4 sheet.
        const downloadDateWiseInvoices = (from, to) => {
            // normalize
            const fromDate = new Date(from);
            const toDate = new Date(to);
            // ensure toDate >= fromDate
            if (toDate < fromDate) { showAlert('To date must be same or after From date', 'error'); return; }

            const filtered = app.invoices.filter(inv => {
                const d = new Date(inv.invoice_date.slice(0, 10));
                return d >= fromDate && d <= toDate;
            });
            if (filtered.length === 0) { showAlert('No invoices for selected date range', 'info'); return; }

            // For each invoice, create one A4 landscape page with Original + Customer Copy side-by-side
            let html = '';
            filtered.forEach(inv => {
                const items = app.invoiceItems.filter(x => x.invoice_id === inv.id);
                const invHtml = generateInvoiceHTML(inv, items);
                html += '<div class="sheet">';
                html += `<div class="a5"><div style="text-align:right; font-weight:bold; margin-bottom:6px;">Original</div>${invHtml}</div>`;
                html += `<div class="a5"><div style="text-align:right; font-weight:bold; margin-bottom:6px;">Customer Copy</div>${invHtml}</div>`;
                html += '</div>';
            });

            // open in A4 landscape so two A5 invoices fit side-by-side
            openPrintWindow(html, `Invoices_${from}_${to}`, 'A4-landscape');
        };

        // ========== RENDER FUNCTION ==========
        const render = () => {
            const navTabs = document.getElementById('navTabs');
            const pagesContainer = document.getElementById('pagesContainer');

            const tabs = [
                { id: 'invoice', label: '📄 Invoice' },
                { id: 'inventory', label: '📦 Inventory' },
                { id: 'history', label: '📜 History' },
                { id: 'reports', label: '📊 Reports' }
            ];

            navTabs.innerHTML = tabs.map(tab => `
                <button class="${app.currentPage === tab.id ? 'active' : ''}" 
                        onclick="navigateTo('${tab.id}')">${tab.label}</button>
            `).join('');

            let page;
            switch (app.currentPage) {
                case 'invoice':
                    page = renderInvoicePage();
                    break;
                case 'inventory':
                    page = renderInventoryPage();
                    break;
                case 'history':
                    page = renderHistoryPage();
                    break;
                case 'reports':
                    page = renderReportsPage();
                    break;
                default:
                    page = renderInvoicePage();
            }

            pagesContainer.innerHTML = '';
            pagesContainer.appendChild(page);

            // Show items list if on invoice page
            if (app.currentPage === 'invoice' && app.currentInvoice.items.length > 0) {
                const itemsList = document.getElementById('itemsList');
                if (itemsList) {
                    itemsList.innerHTML = app.currentInvoice.items.map((item, idx) => `
                        <div class="item-row">
                            <div class="row">
                                <span class="label">${idx + 1}. ${item.name}</span>
                                <button class="danger" style="padding: 5px 10px; font-size: 12px;" onclick="removeItem(${idx})">Remove</button>
                            </div>
                            <div class="row">
                                <span>Pack: ${item.pack} | Qty: ${item.qty}</span>
                                <span style="font-weight: bold;">${formatCurrency(item.price * item.qty * 1.18)}</span>
                            </div>
                        </div>
                    `).join('');
                }
            }
        };

        // ========== INITIALIZE ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadInitialData();
            render();
        });
    </script>
</body>

</html>
